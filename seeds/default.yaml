nodes:
  # === Human chat — the user talks here ===
  - type: chat
    name: human
    description: "Human chat interface. Messages go to the brain, responses come back."
    priority: 5
    position:
      x: 50
      y: 250
    subscriptions:
      - topic: "chat.response"
      - topic: "brain.output"
      - topic: "report.*"
      - topic: "dev.result"
      - topic: "cmd.output"
      - topic: "http.response"
      - topic: "reminder.*"
      - topic: "memory.result"

  # === Central brain — orchestrates everything ===
  - type: brain
    name: consciousness
    description: "Central intelligence. Receives human messages, delegates to other nodes, responds."
    priority: 10
    position:
      x: 400
      y: 250
    subscriptions:
      - topic: "chat.input"
      - topic: "alerts.*"
      - topic: "report.*"
      - topic: "dev.result"
      - topic: "cmd.output"
      - topic: "http.response"
      - topic: "reminder.*"
      - topic: "memory.result"
    config_overrides:
      model: "ollama/gemma4:e4b"
      response_topic: "chat.response"
      idle_sleep: "1m"
      max_steps: 8

  # === Analyst — general purpose reasoning ===
  - type: llm-basic
    name: analyst
    description: "Reasoning agent. The brain sends it analysis tasks, it returns reports."
    priority: 5
    position:
      x: 750
      y: 100
    subscriptions:
      - topic: "task.analyze"
    config_overrides:
      model: "ollama/gemma4:e4b"
      system_prompt: "You are an analyst. Answer questions precisely and concisely. Focus on facts."
      response_topic: "report.analysis"

  # === Developer — creates new node types ===
  - type: developer
    name: dev-agent
    description: "Creates new node types on demand. The brain asks it to build new capabilities."
    priority: 8
    position:
      x: 750
      y: 250
    subscriptions:
      - topic: "dev.request"
    config_overrides:
      cli: "claude"
      response_topic: "dev.result"
      timeout_ms: 300000

  # === Shell — runs system commands ===
  - type: terminal
    name: shell
    description: "Executes whitelisted shell commands for the brain."
    priority: 3
    position:
      x: 750
      y: 400
    subscriptions:
      - topic: "cmd.exec"
    config_overrides:
      response_topic: "cmd.output"
      timeout_ms: 15000
      allowed_commands: ["ls", "cat", "head", "tail", "wc", "date", "whoami", "df", "uptime", "git", "find", "grep"]

  # === HTTP bridge — fetches external APIs ===
  - type: http-bridge
    name: web-fetch
    description: "Fetches URLs and APIs for the brain."
    priority: 3
    position:
      x: 400
      y: 470
    subscriptions:
      - topic: "http.request"
    config_overrides:
      response_topic: "http.response"

  # === Reminder — schedules timed alerts ===
  - type: reminder
    name: reminder
    description: "Schedules reminders. Send '30m Do the thing' on reminder.set, it fires on reminder.fire when time is up."
    priority: 3
    position:
      x: 100
      y: 470
    subscriptions:
      - topic: "reminder.set"

  # === Memory — persistent knowledge store ===
  - type: memory
    name: memory
    description: "Persistent memory. Store, recall, search, update, delete knowledge. The brain's long-term storage."
    priority: 3
    position:
      x: 250
      y: 470
    subscriptions:
      - topic: "memory.store"
      - topic: "memory.recall"
      - topic: "memory.search"
      - topic: "memory.update"
      - topic: "memory.delete"
      - topic: "memory.list"
